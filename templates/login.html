<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — LHP AKPOL</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--navy:#0D2B45;--accent:#D4AF37;--text:#2B2B2B;--muted:#6B7280;
        --border:#D1D5DB;--danger:#B91C1C;--surface:#F3F4F6}
  body{font-family:'Segoe UI',Arial,sans-serif;background:var(--navy);
       min-height:100vh;display:flex;flex-direction:column;
       align-items:center;justify-content:center;padding:20px}
  .logo-wrap{display:flex;flex-direction:column;align-items:center;
             gap:10px;margin-bottom:28px}
  .logo-wrap img{width:72px;height:72px;object-fit:contain}
  .logo-wrap h1{color:var(--accent);font-size:20px;font-weight:800;
                letter-spacing:.5px;text-align:center}
  .logo-wrap p{color:#A8C4E8;font-size:12px;text-align:center}
  .card{background:#fff;border-radius:12px;padding:32px 28px;
        width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .card h2{font-size:16px;font-weight:800;color:var(--navy);
           margin-bottom:24px;text-align:center}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
  .field label{font-size:11px;font-weight:800;color:var(--navy);
               text-transform:uppercase;letter-spacing:.5px}
  .field input{border:1.5px solid var(--border);border-radius:6px;
               padding:10px 12px;font-size:13px;background:var(--surface);
               color:var(--text);width:100%;transition:border-color .15s}
  .field input:focus{outline:none;border-color:var(--accent);
                     box-shadow:0 0 0 3px rgba(212,175,55,.18)}
  .btn{width:100%;background:var(--accent);color:#111;border:none;
       border-radius:6px;padding:12px;font-size:14px;font-weight:800;
       cursor:pointer;transition:background .15s}
  .btn:hover{background:#b8941e}
  .btn:disabled{background:#C9CDD4;cursor:not-allowed}
  #err{color:var(--danger);font-size:12px;font-weight:600;
       margin-top:10px;text-align:center;min-height:18px}
</style>
</head>
<body>
<div class="logo-wrap">
  <img src="/static/logo.png" alt="AKPOL">
  <h1>LHP Kegiatan Positif</h1>
  <p>Akademi Kepolisian — Batalyon Manggala Satya</p>
</div>
<div class="card">
  <h2>Masuk ke Akun</h2>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Username" autocomplete="username">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
  </div>
  <button class="btn" id="btn-login" onclick="doLogin()">Masuk</button>
  <div id="err"></div>
</div>
<script>
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const err      = document.getElementById('err');
  const btn      = document.getElementById('btn-login');
  if (!username || !password) { err.textContent = 'Isi semua field'; return; }
  btn.disabled = true; btn.textContent = 'Memproses...';
  const res  = await fetch('/login', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({username, password})
  });
  const json = await res.json();
  if (json.ok) { window.location.href = json.redirect || '/'; }
  else { err.textContent = json.error || 'Login gagal';
         btn.disabled = false; btn.textContent = 'Masuk'; }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>

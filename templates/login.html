<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — LHP AKPOL</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--navy:#0D2B45;--accent:#D4AF37;--text:#2B2B2B;--muted:#6B7280;
        --border:#D1D5DB;--danger:#B91C1C;--surface:#F3F4F6}
  body{font-family:'Segoe UI',Arial,sans-serif;background:var(--navy);
       min-height:100vh;display:flex;flex-direction:column;
       align-items:center;justify-content:center;padding:20px}
  .logo-wrap{display:flex;flex-direction:column;align-items:center;
             gap:10px;margin-bottom:28px}
  .logo-wrap img{width:72px;height:72px;object-fit:contain}
  .logo-wrap h1{color:var(--accent);font-size:20px;font-weight:800;
                letter-spacing:.5px;text-align:center}
  .logo-wrap p{color:#A8C4E8;font-size:12px;text-align:center}
  .card{background:#fff;border-radius:12px;padding:32px 28px;
        width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .card h2{font-size:16px;font-weight:800;color:var(--navy);
           margin-bottom:24px;text-align:center}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
  .field label{font-size:11px;font-weight:800;color:var(--navy);
               text-transform:uppercase;letter-spacing:.5px}
  .field input{border:1.5px solid var(--border);border-radius:6px;
               padding:10px 12px;font-size:13px;background:var(--surface);
               color:var(--text);width:100%;transition:border-color .15s}
  .field input:focus{outline:none;border-color:var(--accent);
                     box-shadow:0 0 0 3px rgba(212,175,55,.18)}
  .btn{width:100%;background:var(--accent);color:#111;border:none;
       border-radius:6px;padding:12px;font-size:14px;font-weight:800;
       cursor:pointer;transition:background .15s}
  .btn:hover{background:#b8941e}
  .btn:disabled{background:#C9CDD4;cursor:not-allowed}
  #err{color:var(--danger);font-size:12px;font-weight:600;
       margin-top:10px;text-align:center;min-height:18px}
</style>
</head>
<body>
<div class="logo-wrap">
  <img src="/static/logo.png" alt="AKPOL">
  <h1>LHP Kegiatan Positif</h1>
  <p>Akademi Kepolisian — Batalyon Manggala Satya</p>
</div>
<div class="card">
  <h2>Masuk ke Akun</h2>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Username" autocomplete="username">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
  </div>
  <button class="btn" id="btn-login" onclick="doLogin()">Masuk</button>
  <div id="err"></div>

  <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);
              text-align:center;">
    <p style="font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:12px;">
      Untuk menggunakan website ini kamu memerlukan akun yang diberikan oleh admin.<br>
      Hubungi admin untuk mendapatkan akun.
    </p>
    <a href="https://wa.me/6282117108415?text=Halo%2C%20saya%20ingin%20meminta%20akun%20untuk%20mengakses%20website%20LHP%20AKPOL."
       target="_blank"
       style="display:inline-flex;align-items:center;gap:8px;
              background:#25D366;color:#fff;text-decoration:none;
              border-radius:6px;padding:10px 20px;font-size:13px;font-weight:700;
              transition:background .15s;">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
        <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
      </svg>
      Hubungi Admin via WhatsApp
    </a>
  </div>
</div>
<script>
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const err      = document.getElementById('err');
  const btn      = document.getElementById('btn-login');
  if (!username || !password) { err.textContent = 'Isi semua field'; return; }
  btn.disabled = true; btn.textContent = 'Memproses...';
  const res  = await fetch('/login', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({username, password})
  });
  const json = await res.json();
  if (json.ok) { window.location.href = json.redirect || '/'; }
  else { err.textContent = json.error || 'Login gagal';
         btn.disabled = false; btn.textContent = 'Masuk'; }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
